<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="fuel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <g fill="#ffffff" opacity="0.05">
    <circle cx="1100" cy="90" r="3"/><circle cx="1040" cy="60" r="3"/><circle cx="980" cy="110" r="3"/>
    <circle cx="110" cy="540" r="3"/><circle cx="160" cy="500" r="3"/>
  </g>

  <!-- road -->
  <rect x="0" y="470" width="1200" height="160" fill="#0b1220"/>
  <g stroke="#f8fafc" stroke-width="6" stroke-dasharray="40 30" opacity="0.5">
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- split ground: green (electric) vs amber (fuel) -->
  <rect x="0" y="470" width="600" height="160" fill="url(#leaf)" opacity="0.14"/>
  <rect x="600" y="470" width="600" height="160" fill="url(#fuel)" opacity="0.12"/>

  <!-- car body -->
  <g transform="translate(600,430)">
    <path d="M -260,60 Q -260,10 -210,0 L -140,-55 Q -100,-80 -30,-80 L 90,-80 Q 150,-78 190,-40 L 250,0 Q 300,8 300,60 Z"
          fill="#e2e8f0"/>
    <path d="M -120,-55 L -70,-70 Q -30,-78 20,-78 L 80,-78 Q 120,-76 150,-45 L 170,-8 L -140,-8 Z" fill="#0f172a"/>
    <circle cx="-160" cy="65" r="46" fill="#0f172a"/>
    <circle cx="-160" cy="65" r="18" fill="#94a3b8"/>
    <circle cx="180" cy="65" r="46" fill="#0f172a"/>
    <circle cx="180" cy="65" r="18" fill="#94a3b8"/>
  </g>

  <!-- left: electric plug -->
  <g transform="translate(340,300)">
    <circle r="72" fill="#022c22" stroke="url(#leaf)" stroke-width="4"/>
    <path d="M -14,-30 L -14,-6 L -28,-6 L 0,40 L 12,4 L 26,4 L -2,-30 Z" fill="#34d399"/>
  </g>

  <!-- right: fuel pump -->
  <g transform="translate(860,300)">
    <circle r="72" fill="#3a2a06" stroke="url(#fuel)" stroke-width="4"/>
    <g transform="translate(-18,-34)">
      <rect x="0" y="0" width="34" height="60" rx="6" fill="#fbbf24"/>
      <rect x="6" y="-14" width="22" height="16" rx="3" fill="#fbbf24"/>
      <path d="M 34,10 L 50,10 L 50,50 Q 50,60 40,60 L 40,20" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- vs divider -->
  <g transform="translate(600,300)">
    <circle r="34" fill="#0f172a" stroke="#f8fafc" stroke-width="3"/>
    <text x="0" y="9" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f8fafc" text-anchor="middle">1/3</text>
  </g>

  <g transform="translate(90,60)">
    <rect width="230" height="46" rx="23" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <text x="115" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">MOVILIDAD ELÉCTRICA</text>
  </g>
</svg>
