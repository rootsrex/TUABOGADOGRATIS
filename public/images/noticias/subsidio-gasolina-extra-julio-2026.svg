<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pump" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>

  <g fill="#ffffff" opacity="0.05">
    <circle cx="1080" cy="100" r="3"/><circle cx="1130" cy="70" r="3"/><circle cx="150" cy="540" r="3"/>
  </g>

  <!-- ground -->
  <rect x="0" y="520" width="1200" height="110" fill="#0b1220"/>

  <!-- fuel pump -->
  <g transform="translate(560,360)">
    <rect x="-90" y="-150" width="180" height="270" rx="18" fill="url(#pump)"/>
    <rect x="-70" y="-124" width="140" height="90" rx="10" fill="#0f172a"/>
    <text x="0" y="-72" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#fbbf24" text-anchor="middle">EXTRA</text>
    <rect x="-70" y="-16" width="140" height="30" rx="6" fill="#fde68a" opacity="0.9"/>
    <circle cx="-40" cy="120" r="14" fill="#0f172a"/>
    <circle cx="40" cy="120" r="14" fill="#0f172a"/>
    <path d="M 90,-90 L 150,-90 Q 172,-90 172,-68 L 172,40 Q 172,60 152,60 L 130,60"
          fill="none" stroke="#0f172a" stroke-width="14" stroke-linecap="round"/>
    <circle cx="130" cy="60" r="16" fill="#0f172a"/>
  </g>

  <!-- descending price arrow -->
  <g transform="translate(860,300)" stroke="#22c55e" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -60,-70 L 0,-10 L 40,-40 L 100,40"/>
    <polygon points="100,40 62,30 92,66" fill="#22c55e" stroke="none"/>
  </g>

  <!-- price tags -->
  <g transform="translate(300,230)">
    <path d="M 0,-30 L 70,-30 L 110,10 L 70,50 L 0,50 Z" fill="#0f172a" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="20" cy="10" r="7" fill="#94a3b8"/>
    <text x="60" y="18" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f8fafc" text-anchor="middle">$1.02</text>
  </g>
  <g transform="translate(300,330)">
    <path d="M 0,-30 L 70,-30 L 110,10 L 70,50 L 0,50 Z" fill="#022c22" stroke="#34d399" stroke-width="3"/>
    <circle cx="20" cy="10" r="7" fill="#34d399"/>
    <text x="60" y="18" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f8fafc" text-anchor="middle">$0.62</text>
  </g>

  <g transform="translate(90,60)">
    <rect width="230" height="46" rx="23" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="115" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">PRECIOS DE JULIO</text>
  </g>
</svg>
