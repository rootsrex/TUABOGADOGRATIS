<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1547e1"/>
      <stop offset="100%" stop-color="#589fff"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft dotted texture -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="90" cy="90" r="3"/><circle cx="150" cy="70" r="3"/><circle cx="210" cy="110" r="3"/>
    <circle cx="1080" cy="520" r="3"/><circle cx="1130" cy="480" r="3"/><circle cx="1020" cy="560" r="3"/>
  </g>

  <!-- Guayaquil skyline silhouette -->
  <g fill="#0b1220" opacity="0.9">
    <rect x="0" y="520" width="1200" height="110"/>
    <rect x="60" y="470" width="46" height="70"/>
    <rect x="130" y="440" width="40" height="100"/>
    <rect x="960" y="450" width="42" height="90"/>
    <rect x="1030" y="420" width="36" height="120"/>
    <rect x="1100" y="465" width="44" height="75"/>
    <!-- Malecon 2000 tower nod -->
    <rect x="560" y="380" width="18" height="160"/>
    <polygon points="560,380 569,350 578,380"/>
  </g>

  <!-- two party ribbons crossing, symbolizing the switch -->
  <g transform="translate(600,250)">
    <path d="M -300,40 Q -100,-60 260,10 L 260,70 Q -100,0 -300,100 Z" fill="url(#ribbonA)" opacity="0.92"/>
    <path d="M -260,-10 Q 100,60 300,-40 L 300,20 Q 100,120 -260,50 Z" fill="url(#ribbonB)" opacity="0.92"/>
  </g>

  <!-- curved switch arrow -->
  <g transform="translate(600,250)" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round">
    <path d="M -140,-95 A 190 190 0 0 1 150,-95" />
    <polygon points="150,-95 128,-112 128,-78" fill="#f8fafc" stroke="none"/>
  </g>

  <!-- ballot box -->
  <g transform="translate(600,300)">
    <rect x="-70" y="-30" width="140" height="100" rx="10" fill="#0f172a" stroke="#f8fafc" stroke-width="6"/>
    <rect x="-90" y="-52" width="180" height="26" rx="8" fill="#f8fafc"/>
    <rect x="-22" y="-52" width="44" height="10" fill="#0f172a"/>
    <path d="M -14,20 L -2,34 L 22,2" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- label chip -->
  <g transform="translate(90,60)">
    <rect width="230" height="46" rx="23" fill="#0f172a" stroke="#589fff" stroke-width="2"/>
    <text x="115" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">ELECCIONES 2026</text>
  </g>
</svg>
